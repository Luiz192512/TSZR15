name: Secret scan

on:
  pull_request:
  push:
    branches:
      - main
      - MODEL_WHATSBUIS
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.1"
          asset="gitleaks_${version}_linux_x64.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          curl -sSfL "${base_url}/${asset}" -o "/tmp/${asset}"
          curl -sSfL "${base_url}/gitleaks_${version}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          (cd /tmp && grep " ${asset}$" gitleaks_checksums.txt | sha256sum -c -)
          tar -xzf "/tmp/${asset}" -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan for committed secrets
        run: gitleaks detect --source . --log-opts="--all" --redact --no-banner
